topics:
  - name: Artificial Consciousness
    enabled: true
    description: "Papers about machine consciousness, subjective experience, and theories of mind applied to AI systems. Especially, any philosophical approaches on Artifical Intelligence."

  - name: Neural Network Training Methods
    enabled: true
    description: "Papers about alternative training and finetuning methods for neural networks, especially dealing with the inefficiency of backpropagation."

  - name: Symbolic AI
    enabled: true
    description: "Papers combining neural networks with symbolic reasoning, logic, or structured knowledge representations"

  - name: Graph Neural Networks
    enabled: true
    description: "Papers about the expressive freedom of graph neural networks. Especially on the control of the overexceeding freedom of a graph."
  
  - name: Brain inspired AI
    enabled: true
    description: "Papers that got inspirations from a biological brain's structure and behaviors. Brain functions, brain signals, brain energy controls are examples."

  - name: Interpretability
    enabled: false
    description: "Papers about how to analyze the black box neural network and find out the discovered logics. Furthermore, papers about how to design a neural network to be more interpretably trained."
  
  - name: Recurrent Neural Networks
    enabled: true
    description: "Papers about recurrent neural networks, especially on the control of the overexceeding freedom of a recurrent neural network. Also, papers about the training methods for recurrent neural networks."

  - name: Spiking Neural Networks
    enabled: true
    description: "Papers about spiking neural networks, and how it can be trained without backpropagation. Also, papers about the breakthroughs in the performance of spiking neural networks."

  - name: ARC-AGI
    enabled: true
    description: "Papers about the ARC-AGI project, including the ARC Challenge and related research on artificial general intelligence."
  
  - name: Differentiable Logic Gate Networks
    enabled: true
    description: "Papers about differentiable logic gate networks, which combine neural networks with logical reasoning capabilities. This includes research on how to design and train such networks effectively."

  # arXiv categories to fetch from
categories:
  - cs.AI
  - cs.LG
  - cs.CL

# Max papers to fetch per run
max_results: 4000

# Semantic similarity threshold (0.0–1.0, lower = more results)
embedding_threshold: 0.35

# Set to false to disable digest email notifications
email_enabled: true

# Optional: included as a link at the bottom of notification emails
# site_url: "https://yourusername.github.io/arxiv-digest"
